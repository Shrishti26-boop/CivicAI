<!DOCTYPE html>
<html>

<head>

    <title>Leaderboard</title>

    <style>

        body{
            font-family:Arial;
            background:#f3f4f6;
        }

        .container{
            width:800px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,.15);
        }

        h1{
            text-align:center;
            color:#16a34a;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:25px;
        }

        th{
            background:#16a34a;
            color:white;
            padding:15px;
        }

        td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f9fafb;
        }

    </style>

</head>

<body>

<div class="container">

<h1>🏆 CivicAI Leaderboard</h1>

<table>

<tr>

<th>Rank</th>

<th>Name</th>

<th>Badge</th>

<th>Points</th>

</tr>

{% for user in users %}

<tr>

<td>

{% if loop.index == 1 %}
🥇
{% elif loop.index == 2 %}
🥈
{% elif loop.index == 3 %}
🥉
{% else %}
{{ loop.index }}
{% endif %}

</td>

<td>{{ user.name }}</td>

<td>{{ user.badge }}</td>

<td>⭐ {{ user.points }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
