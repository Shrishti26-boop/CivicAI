<!DOCTYPE html>
<html>

<head>
    <title>My Profile</title>

    <style>

        body{
            font-family:Arial;
            background:#f3f4f6;
        }

        .card{
            width:450px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,.15);
            text-align:center;
        }

        h2{
            color:#16a34a;
        }

        .box{
            margin:15px 0;
            padding:15px;
            background:#ecfdf5;
            border-radius:10px;
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="card">

    <h2>👤 My Profile</h2>

    <div class="box">
        <b>Name</b><br>
        {{ user.name }}
    </div>

    <div class="box">
        <b>Email</b><br>
        {{ user.email }}
    </div>

    <div class="box">
        <b>Reward Points</b><br>
        ⭐ {{ user.points }}
    </div>

    <div class="box">
        <b>Badge</b><br>
        {{ user.badge }}
    </div>

</div>

</body>
</html>
