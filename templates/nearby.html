<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Nearby Complaints</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>

        body{
            margin:0;
            font-family:Arial,Helvetica,sans-serif;
            background:#f3f4f6;
        }

        .navbar{

            background:#166534;
            color:white;

            padding:18px 30px;

            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .back{

            background:white;
            color:#166534;

            padding:10px 18px;

            text-decoration:none;

            border-radius:8px;

            font-weight:bold;
        }

        #map{

            width:100%;
            height:90vh;
        }

    </style>

</head>

<body>

<div class="navbar">

    <h2>📍 Nearby Complaints</h2>

    <a href="/dashboard" class="back">
        Dashboard
    </a>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// =========================
// CREATE MAP
// =========================

const map = L.map('map').setView([28.6139,77.2090],12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap contributors'
}
).addTo(map);


// =========================
// USER LIVE LOCATION
// =========================

if(navigator.geolocation){

    navigator.geolocation.getCurrentPosition(function(position){

        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        L.marker([lat,lng])

        .addTo(map)

        .bindPopup("📍 You are here")

        .openPopup();

        map.setView([lat,lng],14);

    });

}


// =========================
// COMPLAINT MARKERS
// =========================

{% for c in complaints %}

{% if c.latitude and c.longitude %}

L.marker([

    {{ c.latitude|float }},

    {{ c.longitude|float }}

])

.addTo(map)

.bindPopup(`

<b>{{ c.title }}</b>

<br>

Category :
{{ c.category }}

<br>

Status :
{{ c.status }}

`);

{% endif %}

{% endfor %}

</script>

</body>

</html>
