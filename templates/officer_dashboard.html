<!DOCTYPE html>
<html>

<head>

<title>Officer Dashboard</title>

<style>

body{
font-family:Arial;
background:#ecfdf5;
margin:0;
}

.navbar{

background:#14532d;
padding:20px;
color:white;

display:flex;
justify-content:space-between;

}

.container{

width:95%;
margin:auto;
margin-top:30px;

}

table{

width:100%;
background:white;

border-collapse:collapse;

}

th{

background:#16a34a;
color:white;
padding:15px;

}

td{

padding:12px;
text-align:center;

border-bottom:1px solid #ddd;

}

img{

width:100px;
border-radius:8px;

}

select{

padding:8px;

}

button{

background:#16a34a;
color:white;

padding:8px 18px;

border:none;

border-radius:6px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="navbar">

<h2>Officer Dashboard</h2>

<a href="/dashboard" style="color:white">

Dashboard

</a>

</div>

<div class="container">

<table>

<tr>

<th>Image</th>

<th>Title</th>

<th>User</th>

<th>Status</th>

<th>Update</th>

</tr>

{% for c in complaints %}

<tr>

<td>

<img src="{{ url_for('static', filename=c.image) }}">

</td>

<td>

{{ c.title }}

</td>

<td>

{{ c.user_name }}

</td>

<td>

{{ c.status }}

</td>

<td>

<form
action="/update-status/{{ c.id }}"
method="POST">

<select name="status">

<option>Pending</option>

<option>In Progress</option>

<option>Resolved</option>

</select>

<button>

Update

</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
